<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  flex-direction:column;
}

button{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:#e91e63;
  color:white;
}

img{
  width:80%;
  max-width:300px;
  margin-top:20px;
  border-radius:20px;
}
</style>
</head>

<body>

<h2>Test Başlat</h2>
<button onclick="baslat()">BAŞLAT</button>

<img id="photo" style="display:none;">

<audio id="audio" controls style="display:none;margin-top:20px;"></audio>

<script>

const CLOUD_NAME = "dmtrmcxpl"; // senin cloud name

function baslat(){

  let code = "1234"; // TEST için sabit kod

  let photoURL = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/clients/${code}/${code}.jpg`;
  let audioURL = `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/clients/${code}/ses.mp3`;

  let img = document.getElementById("photo");
  let audio = document.getElementById("audio");

  img.src = photoURL;
  img.style.display = "block";

  audio.src = audioURL;
  audio.style.display = "block";
  audio.play();
}

</script>

</body>
</html>
