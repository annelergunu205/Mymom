<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love</title>

<style>
body{margin:0;background:black;overflow:hidden;font-family:Arial;color:white;}

#stage{position:fixed;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}

#playBtn{
position:absolute;z-index:20;width:120px;height:120px;background:black;border-radius:50%;
display:flex;align-items:center;justify-content:center;cursor:pointer;
}
#playBtn:after{
content:"";border-left:35px solid white;border-top:20px solid transparent;border-bottom:20px solid transparent;
}

.curtain{
position:absolute;top:0;width:50%;height:100%;
background-image:url("curtain.jpg");
background-size:200% 100%;
transition:2s;
}
#leftCurtain{left:0;background-position:left;}
#rightCurtain{right:0;background-position:right;}
.openLeft{transform:translateX(-100%);}
.openRight{transform:translateX(100%);}

#countdown{display:none;position:absolute;width:100%;height:100%;}
#countVideo{width:100%;height:100%;object-fit:cover;}

#codeScreen{
display:none;position:fixed;width:100%;height:100%;
flex-direction:column;align-items:center;justify-content:center;text-align:center;
}

input{padding:12px;font-size:18px;border:none;border-radius:8px;margin-top:10px;}

button{
padding:12px 25px;margin-top:10px;border:none;border-radius:20px;
background:#e91e63;color:white;font-size:18px;cursor:pointer;
}

#error{color:red;margin-top:10px;display:none;}

#result{
display:none;position:fixed;width:100%;height:100%;
flex-direction:column;align-items:center;justify-content:flex-start;
padding-top:20px;
}

#result img{
width:80%;max-width:400px;border-radius:20px;margin-bottom:10px;
}

#videoBox{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:black;z-index:50;
}

#videoPlayer{
width:100%;height:100%;object-fit:contain;
}

#heartLayer{
position:fixed;width:100%;height:100%;top:0;left:0;
pointer-events:none;overflow:hidden;z-index:999;
}

.heart{
position:absolute;color:red;font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}
</style>
</head>

<body>

<div id="stage">
  <div id="playBtn"></div>
  <div id="leftCurtain" class="curtain"></div>
  <div id="rightCurtain" class="curtain"></div>
  <div id="countdown">
    <video id="countVideo" src="countdown.mp4" playsinline></video>
  </div>
</div>

<div id="codeScreen">
  <h2>❤️ Sürprize son bir adım ❤️</h2>
  <input id="codeInput" placeholder="Kod gir">
  <button id="openBtn">Aç</button>
  <div id="error">Kod yanlış veya yüklenemedi</div>
</div>

<div id="result">
  <img id="resultImage">
  <button id="videoBtn">🎬 Sürprizi Gör</button>
</div>

<div id="videoBox">
  <video id="videoPlayer" controls></video>
</div>

<div id="heartLayer"></div>

<script>
const CLOUD_NAME="dmtrmcxpl";
let currentCode="";
let heartInterval=null;
let videoOpen=false;

// ELEMENTLER
const playBtn=document.getElementById("playBtn");
const leftCurtain=document.getElementById("leftCurtain");
const rightCurtain=document.getElementById("rightCurtain");
const countdown=document.getElementById("countdown");
const video=document.getElementById("countVideo");
const stage=document.getElementById("stage");
const codeScreen=document.getElementById("codeScreen");
const result=document.getElementById("result");
const videoBtn=document.getElementById("videoBtn");
const resultImage=document.getElementById("resultImage");
const videoBox=document.getElementById("videoBox");
const videoPlayer=document.getElementById("videoPlayer");
const heartLayer=document.getElementById("heartLayer");

// GERİ TUŞU
window.addEventListener("popstate",()=>{
  if(videoOpen){
    closeVideo(true);
  }
});

// PERDE
playBtn.addEventListener("click", ()=>{
  playBtn.style.display="none";
  leftCurtain.classList.add("openLeft");
  rightCurtain.classList.add("openRight");

  setTimeout(()=>{
    countdown.style.display="block";
    video.play();
    video.onended=()=>{
      stage.style.display="none";
      codeScreen.style.display="flex";
      startHearts();
    };
  },2000);
});

// KALPLER
function startHearts(){
  if(heartInterval) return;
  heartInterval=setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="❤";
    h.style.left=Math.random()*100+"%";
    heartLayer.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },300);
}

// KOD + GÖRSEL
document.getElementById("openBtn").addEventListener("click", ()=>{
  let code=document.getElementById("codeInput").value.trim();
  if(!code) return;

  const extensions=["png","jpg","jpeg"];

  function tryImage(i){
    if(i>=extensions.length){
      document.getElementById("error").style.display="block";
      return;
    }

    const imgURL=`https://res.cloudinary.com/${CLOUD_NAME}/image/upload/clients/${code}/${code}.${extensions[i]}`;

    let img=new Image();
    img.onload=()=>{
      resultImage.src=imgURL;
      currentCode=code;
      codeScreen.style.display="none";
      result.style.display="flex";
    };
    img.onerror=()=>{tryImage(i+1);};
    img.src=imgURL;
  }

  tryImage(0);
});

// VIDEO AÇ
videoBtn.addEventListener("click", ()=>{
  if(!currentCode) return;

  const videoURL=`https://res.cloudinary.com/${CLOUD_NAME}/video/upload/clients/${currentCode}/video.mp4`;

  videoPlayer.src=videoURL;
  result.style.display="none";
  videoBox.style.display="block";

  videoPlayer.play();

  history.pushState({video:true},"");
  videoOpen=true;
});

// VIDEO BİTİNCE GERİ DÖN
videoPlayer.onended=()=>{
  closeVideo(false);
};

function closeVideo(fromBack){
  videoBox.style.display="none";
  result.style.display="flex";

  videoPlayer.pause();
  videoPlayer.currentTime=0;

  videoOpen=false;

  if(!fromBack){
    history.back();
  }
}
</script>

</body>
</html>
